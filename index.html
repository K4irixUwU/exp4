<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cyber Chaos</title>

<style>
body {
  margin:0;
  background:black;
  color:#0f0;
  font-family:monospace;
  overflow:hidden;
}

/* MATRIX */
canvas {
  position:fixed;
  z-index:0;
}

/* TERMINAL */
.terminal {
  position:relative;
  z-index:2;
  width:90%;
  max-width:800px;
  margin:60px auto;
  padding:20px;
  border:1px solid #0f0;
  background:rgba(0,0,0,.9);
  box-shadow:0 0 25px #0f0;
}

/* OUTPUT */
#output {
  height:260px;
  overflow:auto;
}

/* POPUPS */
.popup {
  position:fixed;
  border:3px solid red;
  color:red;
  background:black;
  padding:15px;
  font-size:18px;
  z-index:9999;
  box-shadow:0 0 30px red;
  animation:glitch .3s infinite;
}

@keyframes glitch {
  0%{transform:translate(0)}
  25%{transform:translate(3px,-3px)}
  50%{transform:translate(-3px,3px)}
  75%{transform:translate(3px,3px)}
  100%{transform:translate(0)}
}

/* SCREEN SHAKE */
.shake {
  animation:shake .2s infinite;
}

@keyframes shake {
  0%{transform:translate(0,0)}
  25%{transform:translate(5px,-5px)}
  50%{transform:translate(-5px,5px)}
  75%{transform:translate(5px,5px)}
  100%{transform:translate(0,0)}
}

/* RED FLASH */
.flash {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:red;
  opacity:0.15;
  z-index:9998;
  animation:flash 0.3s infinite;
}

@keyframes flash {
  0%,100%{opacity:0.1}
  50%{opacity:0.4}
}

/* FINAL SCREEN */
.final {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  color:red;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:50px;
  text-align:center;
  z-index:10000;
  text-shadow:0 0 25px red;
}
</style>
</head>

<body onload="startHack()">

<canvas id="matrix"></canvas>

<div class="terminal">
  <div id="output"></div>
</div>

<script>
/* MATRIX */
const c=document.getElementById("matrix");
const ctx=c.getContext("2d");
c.width=window.innerWidth;
c.height=window.innerHeight;

const letters="01";
const drops=Array(Math.floor(c.width/10)).fill(1);

function draw(){
  ctx.fillStyle="rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,c.width,c.height);
  ctx.fillStyle="#0f0";
  ctx.font="10px monospace";

  drops.forEach((y,i)=>{
    const t=letters[Math.random()*2|0];
    ctx.fillText(t,i*10,y*10);
    if(y*10>c.height && Math.random()>0.975) drops[i]=0;
    drops[i]++;
  });
}
setInterval(draw,33);

/* TERMINAL */
const out=document.getElementById("output");

function log(t){
  const d=document.createElement("div");
  d.textContent=">> "+t;
  out.appendChild(d);
  out.scrollTop=out.scrollHeight;
}

/* STEPS */
const steps=[
  "Initializing connection...",
  "Bypassing firewall...",
  "Injecting payload...",
  "Decrypting data...",
  "System override...",
  "Injecting malware..."
];

async function startHack(){
  for(let s of steps){
    log(s);
    await new Promise(r=>setTimeout(r,400));
  }
  chaos();
}

/* POPUPS */
function popup(){
  const p=document.createElement("div");
  p.className="popup";
  p.textContent="⚠ SYSTEM INFECTED ⚠";

  p.style.left=(Math.random()*60+20)+"%";
  p.style.top=(Math.random()*60+20)+"%";

  document.body.appendChild(p);
  setTimeout(()=>p.remove(),3000);
}

/* CHAOS MODE */
function chaos(){
  log("MALWARE ACTIVE...");
  
  // shake screen
  document.body.classList.add("shake");

  // red flash
  const flash=document.createElement("div");
  flash.className="flash";
  document.body.appendChild(flash);

  // popups spam
  let count=0;
  const spam=setInterval(()=>{
    popup(); popup(); popup();
    count++;

    if(count>15){
      clearInterval(spam);
      fakeDelete();
    }
  },200);
}

/* FAKE FILE DELETE */
function fakeDelete(){
  log("Deleting system files...");

  let files=[
    "system32.dll",
    "user_data.db",
    "security.log",
    "kernel.sys",
    "boot.ini"
  ];

  let i=0;
  const del=setInterval(()=>{
    if(i<files.length){
      log("Deleting "+files[i]+" ...");
      i++;
    } else {
      clearInterval(del);
      finalScreen();
    }
  },400);
}

/* FINAL PRANK */
function finalScreen(){
  document.body.innerHTML=`
    <div class="final">
      YOU HAVE BEEN HACKED 💀<br><br>
      (just kidding 😈)
    </div>
  `;
}
</script>

</body>
</html>
